schema_version: "1.2"

task:
  id: "DF-001"
  type: "greenfield_backend_feature"
  title: "Implement Business Dictionary Service API"
  priority: "medium"

references:
  jira_issue: "DARK-101"
  requirements_file: "REQUIREMENTS.md"
  architecture_file: "ARCHITECTURE.md"

repository:
  provider: "github"
  owner: "edgarkirk"
  name: "business-dictionary"
  target_repository_url: "https://github.com/edgarkirk/business-dictionary.git"
  base_branch: "main"
  target_branch: "ai/DF-001-business-dictionary"
  working_directory: "."

repository_structure:
  required_directories:
    - "src/main/java"
    - "src/test/java"
    - "src/main/resources"
    - "src/main/resources/db/migration"
  required_files:
    - "pom.xml"
    - "mvnw"
    - "mvnw.cmd"
    - "README.md"

scope:
  allowed_paths:
    - "src/main/java/**"
    - "src/test/java/**"
    - "src/main/resources/**"
    - "pom.xml"
    - "README.md"
  forbidden_paths:
    - "target/**"
    - "mvnw"
    - "mvnw.cmd"
    - ".mvn/**"
    - "AGENTS.md"
    - ".agents/**"
    - ".openhands/**"
    - ".github/**"
    - "deployment/**"
    - "infrastructure/**"
    - "k8s/**"
    - "helm/**"

technology:
  language: "Java"
  java_version: "21"
  framework: "Spring Boot"
  spring_boot_version: "3.x"
  build_tool: "Maven"
  database: "PostgreSQL"
  migration_tool: "Flyway"
  test_frameworks:
    - "JUnit 5"
    - "Mockito"
    - "Testcontainers"

implementation_contract:
  package_root: "com.epam.businessdictionary"
  architecture_style: "layered"

  packages:
    - name: "api"
      purpose: "REST controllers"
    - name: "api.request"
      purpose: "Inbound request DTOs"
    - name: "api.response"
      purpose: "Outbound response DTOs and API error model"
    - name: "application"
      purpose: "Business service interface and implementation, transaction boundaries"
    - name: "application.exception"
      purpose: "Business exception classes thrown by the application layer"
    - name: "domain"
      purpose: "JPA entity and domain data representation"
    - name: "persistence"
      purpose: "Spring Data repositories and persistence adapters"
    - name: "config"
      purpose: "JPA auditing, exception handling, and cross-cutting configuration"

api_contract:
  base_path: "/api/v1/dictionary"

database_contract:
  migration_required: true
  migration_path: "src/main/resources/db/migration/V1__create_business_dictionary_table.sql"
  table: "business_dictionary"

  indexes:
    - name: "ux_business_dictionary_normalized_term"
      columns:
        - "normalized_term"
      unique: true

business_rules:
  - "Term is mandatory."
  - "Definition is mandatory."
  - "Term must be unique case-insensitively."
  - "Term lookup must be case-insensitive."
  - "createdAt is set on creation and never changes."
  - "updatedAt is updated on every modification."
  - "Do not implement delete or list endpoints."

quality_gates:
  build_command: "./mvnw clean verify"
  test_command: "./mvnw test"
  static_analysis_command: "./mvnw checkstyle:check spotbugs:check --no-transfer-progress -q"

  required_checks:
    - "compilation"
    - "unit_tests"
    - "controller_tests"
    - "repository_or_integration_tests"

execution:
  max_iterations: 75
  timeout_minutes: 45
  open_pull_request: true

constraints:
  - "Do not implement delete endpoint."
  - "Do not implement list endpoint."
  - "Do not implement authentication."
  - "Do not implement role management."
  - "Do not modify deployment, Kubernetes, Helm, or CI files."
  - "All exception classes must reside in the application.exception package."

definition_of_done:
  - "Implementation matches ARCHITECTURE.md."
  - "All acceptance criteria from REQUIREMENTS.md are satisfied."
  - "All REST endpoints required by the requirements are implemented under api_contract.base_path."
  - "Database migration is created."
  - "Validation rules are enforced."
  - "Error responses use appropriate HTTP status codes."
  - "Tests are implemented and passing."
  - "Build command passes."
  - "No forbidden paths are modified."
  - "Pull request is opened."
