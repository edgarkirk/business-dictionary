spring.application.name=business-dictionary

# Datasource — configure via environment variables in production
spring.datasource.url=${DATASOURCE_URL:jdbc:postgresql://localhost:5432/businessdictionary}
spring.datasource.username=${DATASOURCE_USERNAME:postgres}
spring.datasource.password=${DATASOURCE_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
