spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/businessdictionary}
    username: ${DB_USERNAME:businessdictionary}
    password: ${DB_PASSWORD:businessdictionary}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  flyway:
    enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
